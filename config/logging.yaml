version: 1

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO # set to DEBUG for development
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG # set to INFO for smaller log files
    formatter: standard
    filename: logs/hl7engine.log
    maxBytes: 1048576   # 1 MB
    backupCount: 5

loggers:
  hl7engine:
    level: DEBUG # set to WARNING in production
    handlers: [console, file]
    propagate: no

  # OPTIONAL: specify per subsystem
  # hl7engine.mllp_server:
  #   level: INFO
  #   handlers: [console, file]
  #   propagate: no

  # hl7engine.router:
  #   level: DEBUG
  #   handlers: [file]
  #   propagate: no

root:
  level: INFO
  handlers: [console]