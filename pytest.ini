[pytest]
# -------------------------------------------------------------------
# Test discovery
# -------------------------------------------------------------------
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# -------------------------------------------------------------------
# Ordering: ensure 01 → 09 run in lexical order
# -------------------------------------------------------------------
# pytest runs tests in file-name order by default, so no plugin needed.
# This ensures:
#   test_01_parser.py
#   test_02_mllp.py
#   test_03_component_validation.py
#   ...
#   test_09_routing_yaml_schema_test.py
# run in the correct pipeline sequence.

# -------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# -------------------------------------------------------------------
# Warnings
# -------------------------------------------------------------------
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning

# -------------------------------------------------------------------
# Environment variables for tests
# -------------------------------------------------------------------
# These ensure your listener, router, and DB use consistent paths.
env =
    HL7ENGINE_DB_PATH=hl7engine/messages.db
    HL7ENGINE_ROUTED_PATH=routed

# -------------------------------------------------------------------
# HL7-specific runtime tweaks
# -------------------------------------------------------------------
# hl7apy sometimes uses deep recursion for nested groups.
# Your engine uses find_groups=False, but this is still safe.
addopts =
    --disable-warnings
    --maxfail=1
    --strict-markers
    --color=yes

# -------------------------------------------------------------------
# Encoding
# -------------------------------------------------------------------
console_output_style = classic