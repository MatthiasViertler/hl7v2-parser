<!DOCTYPE html>
<html>
<head>
    <title>HL7 Message Viewer</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        input { padding: 6px; font-size: 14px; }
        button { padding: 6px 12px; }
        table { border-collapse: collapse; margin-top: 20px; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background: #eee; }
    </style>
</head>
<body>

<h2>HL7 Message Viewer</h2>

<div>
    <input id="patientId" placeholder="Search by Patient ID">
    <button onclick="searchByPatient()">Search</button>
</div>

<div>
    <button onclick="loadRecent()">Load Recent Messages</button>
</div>

<table id="results">
    <thead>
        <tr>
            <th>ID</th>
            <th>Timestamp</th>
            <th>Type</th>
            <th>Trigger</th>
            <th>Control ID</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
async function loadRecent() {
    const res = await fetch("http://localhost:8000/messages");
    const data = await res.json();
    renderTable(data);
}

async function searchByPatient() {
    const pid = document.getElementById("patientId").value;
    if (!pid) return;

    const res = await fetch(`http://localhost:8000/patients/${pid}/messages`);
    const data = await res.json();
    renderTable(data);
}

function renderTable(rows) {
    const tbody = document.querySelector("#results tbody");
    tbody.innerHTML = "";

    rows.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${r.id}</td>
            <td>${r.timestamp}</td>
            <td>${r.message_type || ""}</td>
            <td>${r.trigger_event || ""}</td>
            <td>${r.control_id || ""}</td>
            <td>${r.status}</td>
        `;
        tbody.appendChild(tr);
    });
}
</script>

</body>
</html>
